name: SoundCloud Migration

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Migration job to run'
        required: true
        default: 'followings'
        type: choice
        options:
          - followings
          - likes
          - reposts
          - all
      limit:
        description: 'Page size for SoundCloud API (max 200)'
        required: false
        default: '200'
      sleep:
        description: 'Sleep between follow actions (ms)'
        required: false
        default: '900'

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Login source account
        run: node dist/cli.js login source
        env:
          SOUNDCLOUD_CLIENT_ID: ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_SECRET: ${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
          DB_PATH: ./data/migrate.sqlite
          SC_SOURCE_USERNAME: ${{ secrets.SC_SOURCE_USERNAME }}
          SC_SOURCE_PASSWORD: ${{ secrets.SC_SOURCE_PASSWORD }}

      - name: Login target account
        run: node dist/cli.js login target
        env:
          SOUNDCLOUD_CLIENT_ID: ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_SECRET: ${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
          DB_PATH: ./data/migrate.sqlite
          SC_TARGET_USERNAME: ${{ secrets.SC_TARGET_USERNAME }}
          SC_TARGET_PASSWORD: ${{ secrets.SC_TARGET_PASSWORD }}

      - name: Run migration
        run: node dist/cli.js run "$JOB" --limit "$LIMIT" --sleep "$SLEEP"
        env:
          SOUNDCLOUD_CLIENT_ID: ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_SECRET: ${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
          DB_PATH: ./data/migrate.sqlite
          JOB: ${{ inputs.job }}
          LIMIT: ${{ inputs.limit }}
          SLEEP: ${{ inputs.sleep }}

      - name: Clear account tokens from database
        if: always()
        run: |
          if [ -f data/migrate.sqlite ]; then
            sqlite3 data/migrate.sqlite "DELETE FROM accounts;"
          fi

      - name: Commit migration database
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/migrate.sqlite
          git diff --cached --quiet || git commit -m "chore: update migration database [skip ci]"
          git push
